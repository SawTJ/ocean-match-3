<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ocean Match 3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        :root {
            --tile-size: min(60px, 14vw);
            --gap: 5px;
            --bg-color: #0a2540;
        }

        body {
            text-align: center;
            background: var(--bg-color);
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        h1 {
            margin: 10px 0;
            font-size: 1.8rem;
            color: #38bdf8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }
#gameOverOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(10, 37, 64, 0.85); /* Dark blue semi-transparent */
    backdrop-filter: blur(8px); /* Blurs the game board behind */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
}

.game-over-content {
    background: #1a3a5a;
    padding: 40px;
    border-radius: 20px;
    border: 3px solid #38bdf8;
    box-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
    text-align: center;
}

.game-over-content h2 {
    color: #38bdf8;
    font-size: 2.5rem;
    margin: 0 0 10px 0;
}

#finalScoreDisplay {
    font-size: 1.5rem;
    margin-bottom: 30px;
    font-weight: bold;
}

.game-over-content button {
    background: #38bdf8;
    color: #0a2540;
    border: none;
    padding: 15px 30px;
    font-size: 1.2rem;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s;
}

.game-over-content button:hover {
    transform: scale(1.1);
}
.stats-container {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items: center;
    width: calc(6 * var(--tile-size) + 5 * var(--gap));
    margin: 0 auto 15px;
    font-weight: bold;
    font-size: 1.1rem;
    height: 50px; /* Increased from 40px */
}
/* Time stays far left */
#timerText {
    text-align: left;
}

/* Score stays exactly in the middle */
#scoreText {
    text-align: center;
    white-space: nowrap;
    font-size: 1.6rem; /* Increased size */
    color: #ffffff;
    text-shadow: 0 0 10px rgba(56, 189, 248, 0.3); /* Optional: subtle glow to match title */
}

/* Combo container sits to the right of center */
#comboContainer {
    text-align: left;
    padding-left: 10px;
    min-height: 1.2em; /* Prevents layout jump when empty */
}

#comboText {
    color: #facc15;
    font-weight: 900;
}
        #board {
            display: grid;
            grid-template-columns: repeat(6, var(--tile-size));
            grid-template-rows: repeat(6, var(--tile-size));
            gap: var(--gap);
            margin: 0 auto;
            width: fit-content;
            background: rgba(255, 255, 255, 0.05);
            padding: var(--gap);
            border-radius: 12px;
            position: relative;
			overflow: visible;
        }

        .tile {
            width: var(--tile-size);
            height: var(--tile-size);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

.icon-content {
    font-size: calc(var(--tile-size) * 0.65);
    display: block;
    pointer-events: none;
    z-index: 2;
    will-change: transform, opacity; /* Add this line */
}
        .spark {
    position: absolute;
    width: 5px; /* JS will override this size */
    height: 5px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 100; /* Ensure sparks are above ghosts */
}

        #comboText { color: #facc15; min-width: 60px; font-weight: 900; }
    </style>
</head>
<body>

    <h1>Ocean Match 3</h1>

<div class="stats-container">
    <div id="timerText">Time: 30</div>
    <div id="scoreText">Score: 0</div>
    <div id="comboContainer">
        <span id="comboText"></span>
    </div>
</div>

    <div id="board"></div>

<script>
    // Exact original icons and weights
const icons = ["🦀", "🐠", "☸️", "⚓", "🐚", "🐬"];
const weights = [40, 25, 15, 10, 10]; 

// NEW: Use an array so index 0 (Crab) gets Color 0 (Red)
const iconColors = [
    "#d64545", // 0: 🦀 Crab (Muted Crimson)
    "#e9c46a", // 1: 🐠 Fish (Sandy Yellow)
    "#9b87af", // 2: ☸️ Wheel (Dusty Purple)
    "#52606d", // 3: ⚓ Anchor (Slate Grey)
    "#f1dca7", // 4: 🐚 Shell (Warm Cream)
    "#64b5f6"  // 5: 🐬 Dolphin (Soft Sky Blue)
];
    
    const gridWidth = 6;
    let boardData = []; 
    let boardElements = []; 
    let score = 0;
    let timeLeft = 30;
    let isProcessing = true; 
    let selectedIdx = null;
    let timerId = null;
	let startX, startY;
	let comboTimeout;

    function init() {
        const boardDiv = document.getElementById("board");
        boardDiv.innerHTML = "";
        
        for (let i = 0; i < gridWidth * gridWidth; i++) {
            const tileDiv = document.createElement("div");
            tileDiv.classList.add("tile");
            tileDiv.dataset.index = i;
            
            const iconSpan = document.createElement("span");
            iconSpan.classList.add("icon-content");
            tileDiv.appendChild(iconSpan);
            
            tileDiv.addEventListener("mousedown", (e) => handleDragStart(e, i));
tileDiv.addEventListener("touchstart", (e) => handleDragStart(e, i), {passive: false});
tileDiv.addEventListener("mouseup", (e) => handleDragEnd(e, i));
tileDiv.addEventListener("touchend", (e) => handleDragEnd(e, i));
            boardDiv.appendChild(tileDiv);
            
            boardElements.push(tileDiv);
            boardData.push(-1); 
        }

        fillInitialBoard();
        startTimer();
        isProcessing = false;
    }
function handleDragStart(e, idx) {
    if (isProcessing || timeLeft <= 0) return;
    // Record starting position (works for both mouse and touch)
    startX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
    startY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
    selectedIdx = idx;
    boardElements[idx].style.background = "rgba(255, 255, 255, 0.3)";
}

async function handleDragEnd(e, idx) {
    if (isProcessing || selectedIdx === null) return;
    
    const endX = e.clientX || (e.changedTouches ? e.changedTouches[0].clientX : 0);
    const endY = e.clientY || (e.changedTouches ? e.changedTouches[0].clientY : 0);
    
    const dx = endX - startX;
    const dy = endY - startY;
    const threshold = 30; 

    boardElements[selectedIdx].style.background = "";

    if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
        let targetIdx = -1;
        const r = Math.floor(selectedIdx / gridWidth); // Use selectedIdx (the start)
        const c = selectedIdx % gridWidth;

        // Logic fix: We calculate direction based on swipe, 
        // but targetIdx is ALWAYS restricted to +1 or -1 from the start.
        if (Math.abs(dx) > Math.abs(dy)) {
            // Horizontal swipe
            if (dx > 0 && c < gridWidth - 1) targetIdx = selectedIdx + 1;
            else if (dx < 0 && c > 0) targetIdx = selectedIdx - 1;
        } else {
            // Vertical swipe
            if (dy > 0 && r < gridWidth - 1) targetIdx = selectedIdx + gridWidth;
            else if (dy < 0 && r > 0) targetIdx = selectedIdx - gridWidth;
        }

        if (targetIdx !== -1) {
            const i1 = selectedIdx;
            selectedIdx = null; 
            await swap(i1, targetIdx);
        }
    }
    
    selectedIdx = null;
}
    function getWeightedIcon() {
        let r = Math.floor(Math.random() * 100);
        // Using indices 0-4 based on the weight table, fallback to 5 (Dolphin) if logic rolls high
        for (let i = 0; i < weights.length; i++) {
            if (r < weights[i]) return i;
            r -= weights[i];
        }
        return 5; 
    }

    function fillInitialBoard() {
        for (let i = 0; i < boardData.length; i++) {
            let val;
            do {
                val = getWeightedIcon();
            } while (isCreatingMatch(i, val));
            boardData[i] = val;
            renderTile(i);
        }
    }

    function isCreatingMatch(idx, val) {
        const r = Math.floor(idx / gridWidth);
        const c = idx % gridWidth;
        if (c >= 2 && boardData[idx - 1] === val && boardData[idx - 2] === val) return true;
        if (r >= 2 && boardData[idx - gridWidth] === val && boardData[idx - (gridWidth * 2)] === val) return true;
        return false;
    }

    function renderTile(idx) {
        const span = boardElements[idx].querySelector('.icon-content');
        const val = boardData[idx];
        if (val === -1) {
            span.style.opacity = "0";
        } else {
            span.innerText = icons[val];
            span.style.opacity = "1";
            span.style.transform = "scale(1)";
        }
    }

    async function handleInteraction(idx) {
        if (isProcessing || timeLeft <= 0) return;

        if (selectedIdx === null) {
            selectedIdx = idx;
            boardElements[idx].style.background = "rgba(255, 255, 255, 0.3)";
        } else {
            const i1 = selectedIdx;
            const i2 = idx;
            boardElements[i1].style.background = "";
            selectedIdx = null;

            if (checkAdjacency(i1, i2)) {
                await swap(i1, i2);
            }
        }
    }

    function checkAdjacency(i1, i2) {
        const r1 = Math.floor(i1 / gridWidth), c1 = i1 % gridWidth;
        const r2 = Math.floor(i2 / gridWidth), c2 = i2 % gridWidth;
        return (Math.abs(r1 - r2) + Math.abs(c1 - c2)) === 1;
    }

    async function swap(i1, i2, recursiveCheck = true) {
        isProcessing = true;
        const span1 = boardElements[i1].querySelector('.icon-content');
        const span2 = boardElements[i2].querySelector('.icon-content');
        
        const rect1 = boardElements[i1].getBoundingClientRect();
        const rect2 = boardElements[i2].getBoundingClientRect();

        // Anime.js Swap Animation
        await Promise.all([
            anime({
                targets: span1,
                translateX: rect2.left - rect1.left,
                translateY: rect2.top - rect1.top,
                duration: 250,
                easing: 'easeOutQuart'
            }).finished,
            anime({
                targets: span2,
                translateX: rect1.left - rect2.left,
                translateY: rect1.top - rect2.top,
                duration: 250,
                easing: 'easeOutQuart'
            }).finished
        ]);

        let temp = boardData[i1];
        boardData[i1] = boardData[i2];
        boardData[i2] = temp;

        // Reset positions after swap to sync with data
        span1.style.transform = "none";
        span2.style.transform = "none";
        renderTile(i1);
        renderTile(i2);

        if (recursiveCheck) {
            const matches = findMatches();
            if (matches.length > 0) {
                await resolveMatches();
            } else {
                await swap(i1, i2, false); // Swap back if no match
            }
        }
        isProcessing = false;
    }

async function resolveMatches() {
    let combo = 0;
    while (true) {
        const matches = findMatches();
        if (matches.length === 0) break;

        combo++;
        score += matches.length * 10 * combo;
        timeLeft = Math.min(60, timeLeft + 2);
        updateStats(combo);

        await animateClear(matches);

        // RUN BOTH AT THE SAME TIME
        // We await the completion of both simultaneously
        await Promise.all([
            animateFall(),
            animateRefill()
        ]);
    }
}

async function animateClear(matches) {
    const animations = matches.map(idx => {
        const span = boardElements[idx].querySelector('.icon-content');
        
        // 1. Get the raw numeric value of the tile (0 through 5)
        const val = boardData[idx];
        
        // 2. Grab the color directly from the array using that number
        // This completely bypasses any emoji text-matching errors!
        const matchColor = iconColors[val] || "#ffffff";
        
        // 3. Trigger sparks
        spawnSparks(boardElements[idx], matchColor);
        
        // 4. Clear data
        boardData[idx] = -1;

        return anime({
            targets: span,
            scale: 0,
            opacity: 0,
            duration: 400,
            easing: 'easeInBack'
        }).finished;
    });

    await Promise.all(animations);
    matches.forEach(idx => renderTile(idx));
}

async function animateFall() {
    const animations = [];
    const gapSize = boardElements[0].offsetWidth + 5;

    for (let col = 0; col < gridWidth; col++) {
        let emptyCount = 0;
        for (let row = gridWidth - 1; row >= 0; row--) {
            const i = row * gridWidth + col;
            
            if (boardData[i] === -1) {
                emptyCount++;
            } else if (emptyCount > 0) {
                const targetIdx = (row + emptyCount) * gridWidth + col;
                const val = boardData[i];
                const movingSpan = boardElements[i].querySelector('.icon-content');
                
                const ghost = document.createElement("span");
                ghost.innerText = icons[val];
                ghost.style.cssText = `position: absolute; font-size: calc(var(--tile-size) * 0.65); z-index: 20; pointer-events: none;`;
                boardElements[i].appendChild(ghost);

                movingSpan.style.opacity = "0";
                boardData[targetIdx] = val;
                boardData[i] = -1;

                animations.push(anime({
                    targets: ghost,
                    translateY: emptyCount * gapSize,
                    duration: 500, // Slightly faster for a snappier feel
                    easing: 'easeOutElastic(0.5, 1)', // Changed from 0.2 to 0.5 to reduce bounce
                    delay: row * 20
                }).finished.then(() => {
                    ghost.remove();
                    renderTile(targetIdx);
                    renderTile(i);
                }));
            }
        }
    }
    await Promise.all(animations);
}

async function animateRefill() {
    const animations = [];
    const gapSize = boardElements[0].offsetWidth + 5;

    for (let col = 0; col < gridWidth; col++) {
        let emptyInCol = 0;
        for (let row = 0; row < gridWidth; row++) {
            if (boardData[row * gridWidth + col] === -1) emptyInCol++;
        }

        for (let row = 0; row < gridWidth; row++) {
            const i = row * gridWidth + col;
            if (boardData[i] === -1) {
                const val = getWeightedIcon();
                boardData[i] = val;
                
                const targetSpan = boardElements[i].querySelector('.icon-content');
                targetSpan.style.opacity = "0"; 

                const ghost = document.createElement("span");
                ghost.innerText = icons[val];
                ghost.style.cssText = `position: absolute; font-size: calc(var(--tile-size) * 0.65); z-index: 15; pointer-events: none;`;
                boardElements[i].appendChild(ghost);

                animations.push(anime({
                    targets: ghost,
                    translateY: [-(row + emptyInCol + 2) * gapSize, 0],
                    opacity: [0, 1],
                    duration: 500, // Slightly faster
                    delay: row * 30,
                    easing: 'easeOutElastic(0.5, 1)' // Changed from 0.2 to 0.5 to reduce bounce
                }).finished.then(() => {
                    ghost.remove();
                    renderTile(i);
                }));
            }
        }
    }
    await Promise.all(animations);
}

    function findMatches() {
        const matchSet = new Set();
        for (let r = 0; r < gridWidth; r++) {
            for (let c = 0; c < gridWidth - 2; c++) {
                const i = r * gridWidth + c;
                if (boardData[i] !== -1 && boardData[i] === boardData[i+1] && boardData[i] === boardData[i+2]) {
                    matchSet.add(i); matchSet.add(i+1); matchSet.add(i+2);
                }
            }
        }
        for (let c = 0; c < gridWidth; c++) {
            for (let r = 0; r < gridWidth - 2; r++) {
                const i = r * gridWidth + c;
                if (boardData[i] !== -1 && boardData[i] === boardData[i+gridWidth] && boardData[i] === boardData[i+(gridWidth*2)]) {
                    matchSet.add(i); matchSet.add(i+gridWidth); matchSet.add(i+(gridWidth*2));
                }
            }
        }
        return Array.from(matchSet);
    }

function spawnSparks(container, color) {
    for (let i = 0; i < 12; i++) { 
        const s = document.createElement("div");
        s.classList.add("spark");
        
        // Keeping your original larger size
        const size = 6 + Math.random() * 6;
        s.style.width = `${size}px`;
        s.style.height = `${size}px`;
        
        // Remove the glow (box-shadow) and use a slightly softer opacity
        s.style.backgroundColor = color; 
        s.style.opacity = "0.8"; 
        s.style.boxShadow = "none"; // This stops the "too bright" effect
        
        s.style.left = "50%"; 
        s.style.top = "50%";
        container.appendChild(s);
        
        const angle = Math.random() * Math.PI * 2;
        const dist = 60 + Math.random() * 60; 
        
        anime({
            targets: s,
            translateX: Math.cos(angle) * dist,
            translateY: Math.sin(angle) * dist,
            opacity: [0.8, 0],
            scale: [1.5, 0], 
            duration: 1000,
            easing: 'easeOutExpo',
            complete: () => s.remove()
        });
    }
}

function updateStats(combo) {
    document.getElementById("scoreText").innerText = "Score: " + score;
    document.getElementById("timerText").innerText = "Time: " + Math.ceil(timeLeft);
    
    const comboEl = document.getElementById("comboText");
    
    if (combo > 1) {
        // Clear any existing timer so it doesn't disappear too early if you're on a roll
        clearTimeout(comboTimeout);
        
        comboEl.innerText = `x${combo} 🔥`;
        
        // Visual pop for the combo
        anime({ 
            targets: comboEl, 
            scale: [1.3, 1], 
            duration: 300,
            easing: 'easeOutBack'
        });

        // Make it disappear after 1.5 seconds of no matches
        comboTimeout = setTimeout(() => {
            anime({
                targets: comboEl,
                opacity: 0,
                duration: 500,
                complete: () => {
                    comboEl.innerText = "";
                    comboEl.style.opacity = 1; // Reset opacity for next time
                }
            });
        }, 1500);
    }
}

function startTimer() {
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
        timeLeft--;
        document.getElementById("timerText").innerText = "Time: " + Math.max(0, timeLeft);
        
        if (timeLeft <= 0) {
            clearInterval(timerId);
            showGameOver();
        }
    }, 1000);
}
function showGameOver() {
    isProcessing = true; // Stop all interaction
    const overlay = document.getElementById("gameOverOverlay");
    document.getElementById("finalScoreDisplay").innerText = "Final Score: " + score;
    
    overlay.style.display = "flex";
    overlay.style.opacity = 0;

    anime({
        targets: overlay,
        opacity: 1,
        duration: 800,
        easing: 'easeOutQuad'
    });

    // Optional: Animate the content box popping in
    anime({
        targets: '.game-over-content',
        scale: [0.5, 1],
        duration: 1000,
        easing: 'easeOutElastic(1, .8)'
    });
}

    init();
</script>
<div id="gameOverOverlay" style="display: none;">
    <div class="game-over-content">
        <h2>TIME'S UP!</h2>
        <div id="finalScoreDisplay">Score: 0</div>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>
</div>
</body>
</html>
