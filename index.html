<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ocean Match 3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
:root {
    /* Back to stable 60px */
    --tile-size: min(60px, 14vw); 
    --gap: 5px;
    --bg-color: #0a2540;
}

body {
    text-align: center;
    background: var(--bg-color);
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-tap-highlight-color: transparent; 
}

.main-layout-wrapper {
    position: relative;
    display: inline-block;
}

.stats-container {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    align-items: center; width: calc(6 * var(--tile-size) + 5 * var(--gap));
    margin: 0 auto 15px; font-weight: bold; font-size: 1.1rem; height: 50px;
}

.icon-content {
    /* Kept at 0.72 for stable icon-to-tile proportions */
    font-size: calc(var(--tile-size) * 0.72); 
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 2;
}

#board {
    display: grid; grid-template-columns: repeat(6, var(--tile-size));
    grid-template-rows: repeat(6, var(--tile-size)); gap: var(--gap);
    background: rgba(255, 255, 255, 0.05);
    padding: var(--gap); border-radius: 12px; position: relative;
}

.tile {
    width: var(--tile-size); 
    height: var(--tile-size);
    background: rgba(255, 255, 255, 0.1); 
    border-radius: 8px;
    display: flex; 
    justify-content: center; 
    align-items: center;
    position: relative;
    /* This removes the blue highlight/selection when dragging */
    outline: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}
.spark { 
    position: absolute; 
    border-radius: 50%; 
    pointer-events: none; 
    z-index: 100;
    /* Slightly stronger glow to match the 50% size increase */
    box-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
}

#leaderboardArea {
    position: absolute;
    left: calc(100% + 12px);
    top: 0;
    width: 130px; 
    padding: 12px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 10px;
    border: 1px solid #38bdf8;
    text-align: left;
}

#leaderboardArea h3 { font-size: 0.75rem; margin: 0 0 8px 0; color: #38bdf8; text-transform: uppercase; }
#scoreList { list-style: none; padding: 0; margin: 0; font-family: 'Courier New', monospace; font-size: 0.75rem; color: #38bdf8; line-height: 1.5; }

#gameOverOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 37, 64, 0.95); display: none;
    justify-content: center; align-items: center; z-index: 2000;
}
.game-over-content { background: #1a3a5a; padding: 30px; border-radius: 20px; border: 3px solid #38bdf8; text-align: center; }
#playerNameInput { padding: 10px; border-radius: 8px; border: 2px solid #38bdf8; background: #0a2540; color: white; text-align: center; font-weight: bold; width: 150px; margin: 15px 0; outline: none; }
    </style>
</head>
<body>

<h1>Ocean Match 3</h1>

    <div class="stats-container">
        <div id="timerText">Time: 30</div>
        <div id="scoreText">Score: 0</div>
        <div id="comboContainer"><span id="comboText"></span></div>
    </div>

    <div class="main-layout-wrapper">
        <div id="board"></div>

        <div id="leaderboardArea">
            <h3>Top Explorers</h3>
            <ul id="scoreList"></ul>
        </div>
    </div>

    <div id="gameOverOverlay">
        <div class="game-over-content">
            <h2 style="color: #38bdf8;">TIME'S UP!</h2>
            <div id="finalScoreDisplay" style="font-size: 1.5rem;">Score: 0</div>
            <input type="text" id="playerNameInput" placeholder="YOUR NAME" maxlength="6"><br>
            <button onclick="saveAndRestart()" style="padding: 12px 25px; cursor: pointer; background: #38bdf8; color: #0a2540; border: none; border-radius: 8px; font-weight: bold;">SAVE & PLAY AGAIN</button>
        </div>
    </div>
<script>
const icons = ["🦀", "🐠", "☸️", "⚓", "🐚", "🐬"];
const iconColors = ["#d64545", "#e9c46a", "#9b87af", "#52606d", "#f1dca7", "#64b5f6"];
const gridWidth = 6;
let boardData = []; 
let boardElements = []; 
let score = 0;
let timeLeft = 30;
let isProcessing = true; 
let selectedIdx = null;
let timerId = null;
let startX, startY;

function init() {
    displayLeaderboard();
    const boardDiv = document.getElementById("board");
    boardDiv.innerHTML = "";
    
    for (let i = 0; i < 36; i++) {
        const tileDiv = document.createElement("div");
        tileDiv.classList.add("tile");
        const iconSpan = document.createElement("span");
        iconSpan.classList.add("icon-content");
        tileDiv.appendChild(iconSpan);
        
        tileDiv.addEventListener("mousedown", (e) => handleStart(e, i));
        tileDiv.addEventListener("touchstart", (e) => handleStart(e, i), {passive: false});
        tileDiv.addEventListener("mouseup", (e) => handleEnd(e, i));
        tileDiv.addEventListener("touchend", (e) => handleEnd(e, i));
        
        boardDiv.appendChild(tileDiv);
        boardElements.push(tileDiv);
        boardData.push(-1); 
    }
    fillInitial();
    startTimer();
    isProcessing = false;
}

function fillInitial() {
    for (let i = 0; i < 36; i++) {
        let val;
        do { val = Math.floor(Math.random() * 6); } while (isMatch(i, val));
        boardData[i] = val;
        render(i);
    }
}

function isMatch(idx, val) {
    const r = Math.floor(idx / 6), c = idx % 6;
    if (c >= 2 && boardData[idx-1] === val && boardData[idx-2] === val) return true;
    if (r >= 2 && boardData[idx-6] === val && boardData[idx-12] === val) return true;
    return false;
}

function render(i) {
    const span = boardElements[i].querySelector('.icon-content');
    if (boardData[i] === -1) {
        span.style.opacity = "0";
    } else {
        span.innerText = icons[boardData[i]];
        span.style.opacity = "1";
        span.style.transform = "none"; // Reset any translation, but don't force scale
        span.style.display = "flex";
    }
}

function handleStart(e, i) {
    if (isProcessing || timeLeft <= 0) return;
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX; startY = t.clientY;
    selectedIdx = i;
}

async function handleEnd(e, i) {
    if (isProcessing || selectedIdx === null) return;
    const t = e.changedTouches ? e.changedTouches[0] : e;
    const dx = t.clientX - startX, dy = t.clientY - startY;
    const threshold = 30;

    if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
        let target = -1;
        const r = Math.floor(selectedIdx/6), c = selectedIdx%6;
        if (Math.abs(dx) > Math.abs(dy)) {
            if (dx > 0 && c < 5) target = selectedIdx + 1;
            else if (dx < 0 && c > 0) target = selectedIdx - 1;
        } else {
            if (dy > 0 && r < 5) target = selectedIdx + 6;
            else if (dy < 0 && r > 0) target = selectedIdx - 6;
        }

        if (target !== -1) {
            isProcessing = true;
            await swap(selectedIdx, target);
            if (findMatches().length > 0) await resolve();
            else await swap(selectedIdx, target);
            isProcessing = false;
        }
    }
    selectedIdx = null;
}

async function swap(i1, i2) {
    const s1 = boardElements[i1].querySelector('.icon-content');
    const s2 = boardElements[i2].querySelector('.icon-content');
    const r1 = boardElements[i1].getBoundingClientRect();
    const r2 = boardElements[i2].getBoundingClientRect();

    // Swiping animation: Only moves the icons, does not change tile background
    await Promise.all([
        anime({ targets: s1, translateX: r2.left - r1.left, translateY: r2.top - r1.top, duration: 250, easing: 'easeOutQuart' }).finished,
        anime({ targets: s2, translateX: r1.left - r2.left, translateY: r1.top - r2.top, duration: 250, easing: 'easeOutQuart' }).finished
    ]);

    let temp = boardData[i1]; boardData[i1] = boardData[i2]; boardData[i2] = temp;
    s1.style.transform = "none"; s2.style.transform = "none";
    render(i1); render(i2);
}

// Ensure "end" triggers the overlay name input
function end() {
    isProcessing = true;
    document.getElementById("gameOverOverlay").style.display = "flex";
    document.getElementById("finalScoreDisplay").innerText = "Final Score: " + score;
    document.getElementById("playerNameInput").focus();
}

// Logic for saving from the overlay input
function saveAndRestart() {
    const input = document.getElementById("playerNameInput").value.trim();
    const name = input === "" ? "GUEST" : input.substring(0, 6).toUpperCase();
    
    let scores = JSON.parse(localStorage.getItem('oceanScores')) || [];
    scores.push({ name, score });
    scores.sort((a, b) => b.score - a.score);
    localStorage.setItem('oceanScores', JSON.stringify(scores.slice(0, 5)));
    
    location.reload();
}

function findMatches() {
    const matches = new Set();
    for (let r = 0; r < 6; r++) {
        for (let c = 0; c < 4; c++) {
            const i = r * 6 + c;
            if (boardData[i] !== -1 && boardData[i] === boardData[i+1] && boardData[i] === boardData[i+2]) {
                matches.add(i); matches.add(i+1); matches.add(i+2);
            }
        }
    }
    for (let c = 0; c < 6; c++) {
        for (let r = 0; r < 4; r++) {
            const i = r * 6 + c;
            if (boardData[i] !== -1 && boardData[i] === boardData[i+6] && boardData[i] === boardData[i+12]) {
                matches.add(i); matches.add(i+6); matches.add(i+12);
            }
        }
    }
    return Array.from(matches);
}

async function resolve() {
    let combo = 0;
    while (true) {
        const matches = findMatches();
        if (matches.length === 0) break;
        combo++;
        score += matches.length * 10 * combo;
        document.getElementById("scoreText").innerText = "Score: " + score;
        
        await animateClear(matches);
        await animateFlowingDrop();
    }
}

async function animateClear(matches) {
    const animations = matches.map(idx => {
        const span = boardElements[idx].querySelector('.icon-content');
        spawnSparks(boardElements[idx], iconColors[boardData[idx]]);
        boardData[idx] = -1;
        // Only animate opacity to avoid the shrinking "pop" effect
        return anime({ 
            targets: span, 
            opacity: 0, 
            duration: 400, 
            easing: 'easeInQuad' 
        }).finished;
    });
    await Promise.all(animations);
}

async function animateFlowingDrop() {
    const animations = [];
    const gapSize = boardElements[0].offsetWidth + 5;

    for (let col = 0; col < 6; col++) {
        let emptySpaces = 0;
        
        for (let row = 5; row >= 0; row--) {
            const i = row * 6 + col;
            if (boardData[i] === -1) {
                emptySpaces++;
            } else if (emptySpaces > 0) {
                const targetIdx = i + (emptySpaces * 6);
                const val = boardData[i];
                const movingSpan = boardElements[i].querySelector('.icon-content');
                
// Ensure this multiplier is used for all ghost spans in animateFlowingDrop
const ghost = document.createElement("span");
ghost.innerText = icons[val];
ghost.style.cssText = `
    position: absolute; 
    font-size: calc(var(--tile-size) * 0.72); 
    z-index: 20; 
    pointer-events: none; 
    display: flex; 
    justify-content: center; 
    align-items: center;
`;
                boardElements[i].appendChild(ghost);

                movingSpan.style.opacity = "0";
                boardData[targetIdx] = val;
                boardData[i] = -1;

                animations.push(anime({
                    targets: ghost,
                    translateY: emptySpaces * gapSize,
                    duration: 600,
                    easing: 'easeOutElastic(0.6, 1)', 
                    delay: row * 20
                }).finished.then(() => {
                    ghost.remove();
                    render(targetIdx);
                    render(i);
                }));
            }
        }

        for (let row = 0; row < emptySpaces; row++) {
            const i = row * 6 + col;
            boardData[i] = Math.floor(Math.random() * 6);
            const targetSpan = boardElements[i].querySelector('.icon-content');
            targetSpan.style.opacity = "0"; 

            const ghost = document.createElement("span");
            ghost.innerText = icons[boardData[i]];
            // Stable icon size for refilling tiles
            ghost.style.cssText = `position: absolute; font-size: calc(var(--tile-size) * 0.72); z-index: 15; pointer-events: none; display: flex; justify-content: center; align-items: center;`;
            boardElements[i].appendChild(ghost);

            const startPos = -(row + emptySpaces + 1) * gapSize;

            animations.push(anime({
                targets: ghost,
                translateY: [startPos, 0],
                opacity: [0, 1],
                duration: 700,
                delay: row * 30,
                easing: 'easeOutElastic(0.6, 1)'
            }).finished.then(() => {
                ghost.remove();
                render(i);
            }));
        }
    }
    return Promise.all(animations);
}
function spawnSparks(container, color) {
    for (let i = 0; i < 15; i++) {
        const s = document.createElement("div");
        s.classList.add("spark");
        
        // Size increased by 50% (from 4-10px to 6-15px)
        const size = 6 + Math.random() * 9;
        s.style.width = `${size}px`; 
        s.style.height = `${size}px`;
        s.style.backgroundColor = color; 
        s.style.left = "50%"; 
        s.style.top = "50%";
        container.appendChild(s);

        const angle = Math.random() * Math.PI * 2;
        const dist = 40 + Math.random() * 50;

        anime({ 
            targets: s, 
            translateX: Math.cos(angle) * dist, 
            translateY: Math.sin(angle) * dist, 
            opacity: [1, 0], 
            // Scale increased by 50% (from 1.2 to 1.8) for a bigger 'pop'
            scale: [1.8, 0], 
            duration: 800,
            easing: 'easeOutExpo', 
            complete: () => s.remove() 
        });
    }
}

function startTimer() {
    timerId = setInterval(() => {
        timeLeft--;
        document.getElementById("timerText").innerText = "Time: " + Math.max(0, timeLeft);
        if (timeLeft <= 0) { clearInterval(timerId); end(); }
    }, 1000);
}

function end() {
    isProcessing = true;
    document.getElementById("gameOverOverlay").style.display = "flex";
    document.getElementById("finalScoreDisplay").innerText = "Final Score: " + score;
    document.getElementById("playerNameInput").focus();
}

function saveAndRestart() {
    const input = document.getElementById("playerNameInput").value.trim();
    const name = input === "" ? "GUEST" : input.substring(0, 6).toUpperCase();
    
    let scores = JSON.parse(localStorage.getItem('oceanScores')) || [];
    scores.push({ name, score });
    scores.sort((a, b) => b.score - a.score);
    localStorage.setItem('oceanScores', JSON.stringify(scores.slice(0, 5)));
    
    location.reload();
}

function displayLeaderboard() {
    const s = JSON.parse(localStorage.getItem('oceanScores')) || [];
    const list = document.getElementById("scoreList");
    list.innerHTML = s.length === 0 ? "<li>No scores yet!</li>" : 
        s.map((x, i) => `<li>${i+1}. ${x.name.padEnd(6,'.')} ${x.score}</li>`).join('');
}

init();
</script>
</body>
</html>
