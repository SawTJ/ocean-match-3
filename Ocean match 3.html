<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ocean Match 3</title>
  <style>

    :root {
      /* This math ensures 6 tiles fit on a phone screen */
      --tile-size: min(60px, 14vw); 
      --gap: 5px;
    }

    body {
text-align: center;
  background: #0a2540;
  color: white;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 10px;
  overscroll-behavior: contain;
  overflow-x: hidden;
  
  /* FIXED: Prevents the board from being highlighted during swipes */
  user-select: none;
  -webkit-user-select: none;
    }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    #board {
      display: grid;
      /* Fixed: Ensures exactly 6 columns are rendered */
      grid-template-columns: repeat(6, var(--tile-size));
      gap: var(--gap);
      margin: 20px auto;
      /* Fixed: Ensures the container width matches the tiles */
      width: calc(6 * var(--tile-size) + 5 * var(--gap));
    }

    .tile {
width: var(--tile-size);
  height: var(--tile-size);
  font-size: calc(var(--tile-size) * 0.6); 
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1e3a5f;
  border-radius: 8px;
  position: relative;
  touch-action: none;
  overflow: hidden; 
  
  /* FIXED: Changes cursor to a hand and prevents text selection */
cursor: grab;
  user-select: none;
  -webkit-user-select: none;
  overflow: visible; /* Changed to visible so sparks can fly outside the tile box */
    }
.tile:active {
  cursor: grabbing;
}

    .icon-content {
      display: block;
      position: relative;
      z-index: 5;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.2s;
      will-change: transform;
      font-variant-emoji: emoji;
      -webkit-font-smoothing: antialiased;
    }

    .pop {
      transform: scale(1.4);
      opacity: 0;
    }

    .bounce {
      animation: iconBounce 0.3s;
    }

    @keyframes iconBounce {
      0% { transform: translateY(-10px); }
      50% { transform: translateY(5px); }
      100% { transform: translateY(0); }
    }

    .stats-container {
      width: calc(6 * var(--tile-size) + 5 * var(--gap));
      margin: 0 auto;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 50px;
    }

    #scoreText {
      font-size: clamp(18px, 5vw, 24px);
    }

    #comboText {
      position: absolute;
      left: calc(50% + 70px); 
      text-align: left;
      font-size: 11px;
      color: #ffcc00;
      line-height: 1.1;
      text-transform: uppercase;
      pointer-events: none;
    }
/* The container for the sparks */
.spark {

  position: absolute;
  width: 8px; 
  height: 8px;
  background: var(--spark-color, #ffcc00);
  border-radius: 50%;
  pointer-events: none;
  z-index: 10;
  /* FIXED: Glow now uses the dynamic spark color */
  box-shadow: 0 0 10px var(--spark-color, #ffcc00);
  animation: spark-fade 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  will-change: transform, opacity;

}

@keyframes spark-fade {
  0% {
    transform: translate(0, 0) scale(1);
    opacity: 1;
  }
  100% {
    /* Flies out to the random coordinates set by JS */
    transform: translate(var(--dx), var(--dy)) scale(0.3);
    opacity: 0;
  }
}
  </style>
</head>
<body>

<div class="game-container">
  <h1>⚓ Ocean Match 3 🌊</h1>
  <p>Click or Swipe to swap</p>

  <div class="stats-container">
    <span id="scoreText">Score: 0</span>
    <span id="comboText"></span>
  </div>

  <div id="board"></div>
</div>

<script>
const icons = ["\u{2693}", "\u{1F41A}", "\u{1F420}", "\u{1FAB8}", "\u{1F48E}"];
const iconColors = {
  "\u{2693}": "#cbd5e1", // Anchor (Silver)
  "\u{1F41A}": "#f8fafc", // Shell (White)
  "\u{1F420}": "#fb923c", // Fish (Orange)
  "\u{1FAB8}": "#f87171", // Coral (Red)
  "\u{1F48E}": "#38bdf8"  // Gem (Bright Blue)
};
const width = 6;
let board = [];
let firstTile = null;
let isProcessing = false;
let score = 0;
let startX, startY;

function createBoard() {
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";
  board = [];

  for (let i = 0; i < width * width; i++) {
    let tile = document.createElement("div");
    tile.classList.add("tile");
    let value = getWeightedRandomIcon();
    setTile(tile, value);

    tile.addEventListener("mousedown", (e) => handleInputStart(e, i));
    tile.addEventListener("mouseup", (e) => handleInputEnd(e, i));
    tile.addEventListener("dragstart", (e) => e.preventDefault());
    tile.addEventListener("touchstart", (e) => handleInputStart(e.touches[0], i), {passive: true});
    tile.addEventListener("touchend", (e) => handleInputEnd(e.changedTouches[0], i), {passive: true});

    board.push(tile);
    boardDiv.appendChild(tile);
  }
}

function handleInputStart(e, index) {
  if (isProcessing) return;
  startX = e.clientX;
  startY = e.clientY;
  firstTile = { tile: board[index], index: index };
}

function handleInputEnd(e, index) {
  if (isProcessing || !firstTile) return;

  let endX = e.clientX;
  let endY = e.clientY;
  let diffX = endX - startX;
  let diffY = endY - startY;

  if (Math.abs(diffX) < 15 && Math.abs(diffY) < 15) {
    if (firstTile.index === index) {
       selectTile(firstTile.tile, index);
    }
  } else {
    firstTile.tile.style.background = "#1e3a5f";
    let originIndex = firstTile.index;
    firstTile = null;
    handleSwipe(originIndex, diffX, diffY);
  }
}

function handleSwipe(index, diffX, diffY) {
  let targetIndex = -1;
  if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 30) {
    if (diffX > 0 && (index % width) < width - 1) targetIndex = index + 1;
    else if (diffX < 0 && (index % width) > 0) targetIndex = index - 1;
  } 
  else if (Math.abs(diffY) > Math.abs(diffX) && Math.abs(diffY) > 30) {
    if (diffY > 0 && index < width * (width - 1)) targetIndex = index + width;
    else if (diffY < 0 && index >= width) targetIndex = index - width;
  }

  if (targetIndex !== -1) executeMove(index, targetIndex);
}

async function executeMove(i1, i2) {
  isProcessing = true;
  swapTiles(i1, i2);
  await sleep(300);
  
  let matches = getMatches();
  if (matches.length > 0) {
    processBoard(); 
  } else {
    swapTiles(i1, i2);
    isProcessing = false;
  }
}

function setTile(tile, value) {
  tile.dataset.value = value;
  tile.innerHTML = value == -1 ? "" : `<span class="icon-content">${icons[value]}</span>`;
}

function selectTile(tile, index) {
  if (isProcessing) return;

  if (firstTile && firstTile.index === index && firstTile.tile.style.background !== "rgb(30, 58, 95)") {
    firstTile.tile.style.background = "#1e3a5f";
    firstTile = null;
    return;
  }

  if (!firstTile || firstTile.tile.style.background === "rgb(30, 58, 95)") {
    firstTile = { tile, index };
    tile.style.background = "#3a6ea5";
  } else {
    const row1 = Math.floor(firstTile.index / width);
    const col1 = firstTile.index % width;
    const row2 = Math.floor(index / width);
    const col2 = index % width;
    
    if (Math.abs(row1 - row2) + Math.abs(col1 - col2) === 1) {
      swapTiles(firstTile.index, index);
      firstTile.tile.style.background = "#1e3a5f";
      let matches = getMatches();
      if (matches.length > 0) {
        firstTile = null;
        processBoard();
      } else {
        isProcessing = true;
        let savedIndex = firstTile.index;
        firstTile = null;
        setTimeout(() => {
          swapTiles(savedIndex, index);
          isProcessing = false;
        }, 400);
      }
    } else {
      firstTile.tile.style.background = "#1e3a5f";
      firstTile = { tile, index };
      tile.style.background = "#3a6ea5";
    }
  }
}

function swapTiles(i1, i2) {
  let temp = board[i1].dataset.value;
  setTile(board[i1], board[i2].dataset.value);
  setTile(board[i2], temp);
}

function getMatches() {
  let matches = new Set();
  for (let i = 0; i < board.length; i++) {
    let val = board[i].dataset.value;
    if (val == -1) continue;
    if (i % width < width - 2) {
      if (board[i+1].dataset.value == val && board[i+2].dataset.value == val) {
        matches.add(i); matches.add(i+1); matches.add(i+2);
      }
    }
    if (i < width * (width - 2)) {
      if (board[i+width].dataset.value == val && board[i+2*width].dataset.value == val) {
        matches.add(i); matches.add(i+width); matches.add(i+2*width);
      }
    }
  }
  return [...matches];
}

function clearMatches(matchIndexes) {
  // Increase intensity based on match length (3 = 1x, 4 = 1.5x, 5+ = 2x)
  const intensity = Math.min(2, 1 + (matchIndexes.length - 3) * 0.5);

  matchIndexes.forEach(i => {
    let tile = board[i];
    let iconSpan = tile.querySelector('.icon-content');
    
    if (iconSpan) {
      // 1. Get the numerical value (0-4) stored on the tile
      const val = parseInt(tile.dataset.value);
      // 2. Get the corresponding emoji from your icons array
      const emoji = icons[val];
      // 3. Get the color from your map, fallback to gold
      const explosionColor = iconColors[emoji] || "#ffcc00";

      iconSpan.classList.add("pop");
      createSparks(tile, intensity, explosionColor);
    }

    setTimeout(() => {
      board[i].dataset.value = -1;
      board[i].innerHTML = "";
    }, 200);
  });
}

function createSparks(tile, intensity, color) {
  const rect = tile.getBoundingClientRect();
  const centerX = rect.width / 2;
  const centerY = rect.height / 2;
  
  // Clamped between 5 and 7 circles to prevent clutter
  const particleCount = Math.floor(Math.random() * 3) + 5; 

  for (let i = 0; i < particleCount; i++) {
    const spark = document.createElement("div");
    spark.classList.add("spark");
    
    // Set the specific icon color passed from clearMatches
    spark.style.setProperty('--spark-color', color);
    
    // Calculate spread: random directions with varied distances
    const angle = Math.random() * Math.PI * 2;
    // Intensity (match size) slightly increases the distance they fly
    const distance = (Math.random() * 40 + 40) * intensity;
    const dx = Math.cos(angle) * distance + "px";
    const dy = Math.sin(angle) * distance + "px";

    spark.style.setProperty('--dx', dx);
    spark.style.setProperty('--dy', dy);
    
    // Position at the center of the tile
    spark.style.left = (centerX - 4) + "px"; // Offset by half-width (4px) to center perfectly
    spark.style.top = (centerY - 4) + "px";
    
    tile.appendChild(spark);

    // Clean up the element after the animation finishes
    setTimeout(() => spark.remove(), 800);
  }
}

async function dropTiles() {
  let maxDrops = 0;
  let animations = [];
  const tileSize = board[0].getBoundingClientRect().width + 5; 

  for (let col = 0; col < width; col++) {
    let emptySpaces = 0;
    for (let row = width - 1; row >= 0; row--) {
      let i = row * width + col;
      if (board[i].dataset.value == -1) {
        emptySpaces++;
      } else if (emptySpaces > 0) {
        let targetIndex = (row + emptySpaces) * width + col;
        let val = board[i].dataset.value;
        let iconElement = board[i].querySelector('.icon-content');

        if (iconElement) {
          maxDrops = Math.max(maxDrops, emptySpaces);
          iconElement.style.transform = `translateY(${emptySpaces * tileSize}px)`;

          let anim = new Promise(resolve => {
            setTimeout(() => {
              setTile(board[targetIndex], val);
              const newIcon = board[targetIndex].querySelector('.icon-content');
              if (newIcon) {
                newIcon.classList.add("bounce");
                setTimeout(() => newIcon.classList.remove("bounce"), 300);
              }
              board[i].dataset.value = -1;
              board[i].innerHTML = "";
              resolve();
            }, 400); 
          });
          animations.push(anim);
        }
      }
    }
  }
  if (animations.length > 0) await Promise.all(animations);
}

function refillBoard() {
  for (let i = 0; i < board.length; i++) {
    if (board[i].dataset.value == -1) {
      let newVal = getWeightedRandomIcon();
      setTile(board[i], newVal);
      const icon = board[i].querySelector('.icon-content');
      if (icon) {
        icon.style.opacity = "0";
        icon.style.transform = "scale(0.5)";
        setTimeout(() => {
          icon.style.opacity = "1";
          icon.style.transform = "scale(1)";
        }, 50);
      }
    }
  }
}

function getWeightedRandomIcon() {
  const weights = [40, 25, 15, 10, 10]; 
  const totalWeight = weights.reduce((a, b) => a + b, 0);
  let random = Math.floor(Math.random() * totalWeight);
  for (let i = 0; i < weights.length; i++) {
    if (random < weights[i]) return i;
    random -= weights[i];
  }
  return 0;
}

async function processBoard() {
  isProcessing = true;
  let combo = 0;

  while (true) {
    let matches = getMatches();
    if (matches.length === 0) break;

    combo++;
    let basePoints = matches.length * 10;
    let bonus = matches.length === 4 ? 50 : (matches.length >= 5 ? 150 : 0);
    let points = (basePoints + bonus) * combo;
    score += points;

    document.getElementById("scoreText").innerText = "Score: " + score;
    let comboDisplay = document.getElementById("comboText");
    let comboLine = combo > 1 ? `Combo x${combo} 🔥` : "";
    let bonusLine = bonus > 0 ? "BIG MATCH! 🌟" : "";
    comboDisplay.innerHTML = `${comboLine}${comboLine && bonusLine ? '<br>' : ''}${bonusLine}<br>(+${points})`;

    clearMatches(matches);
    await sleep(400);
    await dropTiles();
    refillBoard();
    await sleep(400);
  }
  document.getElementById("comboText").innerText = "";
  isProcessing = false;
}

function sleep(ms) { return new Promise(res => setTimeout(res, ms)); }

createBoard();
setTimeout(processBoard, 500);
</script>
</body>
</html>
